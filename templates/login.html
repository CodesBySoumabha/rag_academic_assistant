<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NoteFlow - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 py-4 lg:px-40 bg-white dark:bg-background-dark">
<div class="flex items-center gap-3 text-primary">
<div class="size-8 flex items-center justify-center rounded-lg bg-primary text-white">
<span class="material-symbols-outlined text-2xl">description</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold leading-tight tracking-tight">NoteFlow</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">Help</button>
<button class="rounded-full bg-primary px-4 py-2 text-sm font-bold text-white shadow-sm hover:bg-primary/90 transition-all">Support</button>
</div>
</header>
<main class="flex flex-1 items-center justify-center px-4 py-12">
<div class="w-full max-w-[480px] space-y-8">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="p-8">
<div class="mb-8">
<div class="w-full h-32 mb-6 bg-gradient-to-br from-primary/20 to-primary/5 rounded-lg flex items-center justify-center overflow-hidden">
<div class="relative w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Abstract blue flowing waves and geometric patterns" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCtfmauuKIeb3cEgh77ZAHk1jXC-ivy2vwhXN5rfQdoe9HEMYTLDnYObEPJQGBAj0Spg_IEV5qRrY2ts_0OC-JLkGadotBzwkcDiI-SUKKrWEq9j2NmnEd4BcKDHNU0QWjkckP2Kuk8PBStnnrjFSW9NXezGIETKQHknFwa_P7MLH8lhmXmVwC75z7VIigUuLepCu4FRoEC7Qd-pwH1HBmxLMLuYJ1bJO-x-Wc0zkZ5DPye1zgF0mBXD_OpAz0zyRMYC_LDxBKw7C-G");'>
</div>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">Enter your credentials to manage your documents</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Enter your username" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 py-1">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 select-none" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
</div>
<div class="px-8 py-5 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                                Don't have an account? 
                                <a class="font-bold text-primary hover:underline ml-1" href="#">Register for an account</a>
</p>
</div>
</div>
<div class="flex justify-center gap-6 text-xs text-slate-500 uppercase tracking-widest font-bold">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Security</a>
</div>
</div>
</main>
<footer class="py-8 text-center text-slate-400 text-sm">© 2024 NoteFlow Inc. All rights reserved.</footer>
</div>
</div>
</body></html>
